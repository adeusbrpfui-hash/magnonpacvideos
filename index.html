<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagnonPacVideos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#1db954;--verde2:#17a349;--verde3:#e8f5e9;--verde4:#c8e6c9;
  --branco:#ffffff;--cinza:#f5f5f5;--cinza2:#eeeeee;--cinza3:#bdbdbd;
  --texto:#212121;--texto2:#757575;--texto3:#bdbdbd;
  --sombra:0 2px 12px rgba(0,0,0,.08);--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cinza);color:var(--texto);font-family:'Poppins',sans-serif;min-height:100vh}
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--cinza3);border-radius:4px}
#telaCaptcha{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#f1f8e9,#e8f5e9,#ffffff)}
.captcha-box{background:var(--branco);border-radius:24px;padding:40px 28px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(29,185,84,.12);display:flex;flex-direction:column;align-items:center;gap:16px}
.captcha-logo{font-size:24px;font-weight:800;color:var(--verde)}
.captcha-sub{font-size:13px;color:var(--texto2);text-align:center}
.captcha-calc{background:var(--verde3);border-radius:16px;padding:20px 32px;font-size:32px;font-weight:800;color:var(--verde2);letter-spacing:4px;text-align:center;width:100%}
.captcha-inp{width:100%;padding:13px;border-radius:var(--radius);border:2px solid var(--cinza2);background:var(--cinza);font-size:22px;font-weight:700;text-align:center;font-family:'Poppins',sans-serif;outline:none;color:var(--texto);transition:.2s}
.captcha-inp:focus{border-color:var(--verde)}
.captcha-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--verde);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;box-shadow:0 4px 16px rgba(29,185,84,.3)}
.captcha-err{color:#e53935;font-size:13px;text-align:center}
#telaLogin{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#f1f8e9,#e8f5e9,#ffffff)}
.login-box{background:var(--branco);border-radius:24px;padding:40px 28px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(29,185,84,.12);display:flex;flex-direction:column;align-items:center;gap:14px}
.login-logo{font-size:22px;font-weight:800;color:var(--verde);text-align:center}
.login-sub{font-size:13px;color:var(--texto2);margin-top:-8px}
.l-inp{width:100%;padding:13px 16px;border-radius:var(--radius);border:2px solid var(--cinza2);background:var(--cinza);color:var(--texto);font-size:15px;font-family:'Poppins',sans-serif;outline:none;transition:.2s}
.l-inp:focus{border-color:var(--verde)}
.l-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--verde);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;box-shadow:0 4px 16px rgba(29,185,84,.3)}
.l-btn2{width:100%;padding:13px;border-radius:var(--radius);border:2px solid var(--verde4);background:transparent;color:var(--verde);font-size:15px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif}
.l-err{color:#e53935;font-size:13px;text-align:center}
#header{position:fixed;top:0;left:0;right:0;height:56px;background:var(--branco);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.h-logo{font-size:15px;font-weight:800;color:var(--verde);line-height:1.1}
.h-logo span{display:block;font-size:10px;font-weight:500;color:var(--texto2)}
.h-right{display:flex;align-items:center;gap:10px}
.h-busca-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px}
.h-av{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--verde);cursor:pointer;background:var(--cinza2)}
#navbar{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--branco);display:flex;justify-content:space-around;align-items:center;z-index:300;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nb{background:none;border:none;color:var(--texto3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:600;padding:6px 10px;font-family:'Poppins',sans-serif;transition:.2s}
.nb .ic{font-size:22px}
.nb.ativo{color:var(--verde)}
.tela{display:none;padding:64px 0 68px;min-height:100vh}
.tela.ativa{display:block}
#modalBusca{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;flex-direction:column;padding:20px}
.busca-box{background:var(--branco);border-radius:16px;overflow:hidden;flex:1;display:flex;flex-direction:column;max-height:90vh}
.busca-header{padding:14px 16px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--cinza2)}
.busca-inp{flex:1;padding:10px 14px;border-radius:20px;border:2px solid var(--cinza2);background:var(--cinza);font-size:14px;font-family:'Poppins',sans-serif;outline:none}
.busca-inp:focus{border-color:var(--verde)}
.busca-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--texto2)}
.busca-resultados{flex:1;overflow-y:auto;padding:12px}
.busca-vazio{text-align:center;color:var(--texto2);padding:40px 20px;font-size:14px}
.busca-item{display:flex;gap:10px;align-items:center;padding:10px;border-radius:var(--radius);cursor:pointer;transition:.2s}
.busca-item:hover{background:var(--cinza)}
.busca-thumb{width:80px;height:50px;object-fit:cover;border-radius:8px;background:var(--cinza2);flex-shrink:0}
.busca-info{flex:1}
.busca-titulo{font-size:13px;font-weight:600;color:var(--texto);margin-bottom:3px}
.busca-meta{font-size:11px;color:var(--texto2)}
#modalEmoji{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;flex-direction:column;padding:20px}
.emoji-box{background:var(--branco);border-radius:16px;overflow:hidden;flex:1;display:flex;flex-direction:column;max-height:90vh}
.emoji-header{padding:14px 16px;border-bottom:1px solid var(--cinza2)}
.emoji-titulo{font-size:15px;font-weight:700;color:var(--texto);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.emoji-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--texto2)}
.emoji-inp{width:100%;padding:10px 14px;border-radius:20px;border:2px solid var(--cinza2);background:var(--cinza);font-size:14px;font-family:'Poppins',sans-serif;outline:none}
.emoji-inp:focus{border-color:var(--verde)}
.emoji-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;overflow-y:auto;flex:1}
.emoji-item{border-radius:var(--radius);overflow:hidden;background:var(--cinza)}
.emoji-item img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
.emoji-dl{display:block;width:100%;padding:7px;text-align:center;background:var(--verde);color:#fff;border:none;font-weight:700;font-size:12px;cursor:pointer;text-decoration:none;font-family:'Poppins',sans-serif}
.vazio{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:14px;text-align:center}
.vazio-ico{font-size:56px}
.vazio-titulo{font-size:17px;font-weight:700;color:var(--texto)}
.vazio-sub{font-size:13px;color:var(--texto2);line-height:1.6;max-width:260px}
.yt-list{padding:12px;display:flex;flex-direction:column;gap:14px}
.yt-card{background:var(--branco);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sombra)}
.yt-thumb-wrap{position:relative;cursor:pointer;background:#000}
.yt-thumb{width:100%;height:196px;object-fit:cover;display:block}
.yt-no-thumb{width:100%;height:196px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:flex;align-items:center;justify-content:center;font-size:52px}
.yt-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2)}
.yt-play svg{width:52px;height:52px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.yt-views{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.yt-player{width:100%;max-height:240px;background:#000;display:none}
.yt-info{padding:12px}
.yt-titulo{font-size:14px;font-weight:700;color:var(--texto);margin-bottom:8px;line-height:1.4}
.yt-meta{display:flex;align-items:center;gap:8px}
.yt-av{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--cinza2);flex-shrink:0}
.yt-info2{flex:1}
.yt-uname{font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px}
.yt-vcheck{width:14px;height:14px}
.yt-data{font-size:11px;color:var(--texto2)}
.yt-actions{display:flex;gap:4px;padding:8px 12px 12px;border-top:1px solid var(--cinza2);margin-top:8px}
.btn-act{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--texto2);font-size:13px;font-weight:500;padding:7px 12px;border-radius:20px;font-family:'Poppins',sans-serif;transition:.15s}
.btn-act:hover{background:var(--cinza2)}
.btn-act.liked{color:var(--verde)}
.btn-act img{width:22px;height:22px;object-fit:contain}
.shorts-list{padding:12px;display:flex;flex-direction:column;gap:12px}
.short-card{background:var(--branco);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sombra)}
.short-video{width:100%;max-height:500px;background:#000;display:block}
.short-info{padding:10px 12px}
.short-uname{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.short-desc{font-size:12px;color:var(--texto2)}
.short-actions{display:flex;gap:4px;padding:6px 12px 10px}
.coms-box{display:none;border-top:1px solid var(--cinza2);padding:12px}
.coms-lista{max-height:200px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.com-item{display:flex;gap:8px}
.com-av{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--cinza2);flex-shrink:0}
.com-bubble{background:var(--cinza);border-radius:10px;padding:7px 12px;flex:1}
.com-user{font-weight:700;font-size:11px;color:var(--verde2);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.com-txt{font-size:13px;color:var(--texto)}
.com-row{display:flex;gap:8px}
.com-inp{flex:1;padding:9px 14px;border-radius:20px;border:2px solid var(--cinza2);background:var(--cinza);color:var(--texto);font-size:13px;font-family:'Poppins',sans-serif;outline:none}
.com-inp:focus{border-color:var(--verde)}
.com-send{padding:9px 16px;border-radius:20px;border:none;background:var(--verde);color:#fff;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;font-size:13px}
.bseg{padding:6px 0;border:none;background:none;cursor:pointer;display:flex;align-items:center}
.bseg img{height:28px;object-fit:contain}
.bseg.sim img{opacity:.5;filter:grayscale(1)}
.up-wrap{padding:12px;display:flex;flex-direction:column;gap:14px}
.up-card{background:var(--branco);border-radius:var(--radius);padding:20px;box-shadow:var(--sombra)}
.up-card h3{font-size:15px;font-weight:700;color:var(--texto);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.up-drop{width:100%;padding:18px;border-radius:var(--radius);border:2px dashed var(--cinza3);background:var(--cinza);color:var(--texto2);font-size:14px;cursor:pointer;text-align:center;display:block;font-family:'Poppins',sans-serif;transition:.2s}
.up-drop:hover{border-color:var(--verde);color:var(--verde)}
.up-nome{font-size:12px;color:var(--verde);margin:4px 0 8px;min-height:16px;font-weight:500}
.up-inp{width:100%;padding:11px 14px;margin:6px 0;border-radius:var(--radius);border:2px solid var(--cinza2);background:var(--cinza);color:var(--texto);font-size:14px;font-family:'Poppins',sans-serif;outline:none;resize:none}
.up-inp:focus{border-color:var(--verde)}
.up-tipo{display:flex;gap:8px;margin:6px 0}
.up-tipo label{flex:1;padding:10px;border-radius:var(--radius);border:2px solid var(--cinza2);background:var(--cinza);text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--texto2);transition:.2s}
.up-tipo input{display:none}
.up-tipo input:checked+label{border-color:var(--verde);background:var(--verde3);color:var(--verde2)}
.up-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--verde);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Poppins',sans-serif;margin-top:8px;box-shadow:0 4px 16px rgba(29,185,84,.25)}
.up-btn img{height:22px;vertical-align:middle;margin-right:6px}
.perfil-capa{width:100%;height:130px;background:linear-gradient(135deg,var(--verde),var(--verde2),#81c784)}
.perfil-body{padding:0 16px 20px;margin-top:-36px}
.perfil-av-wrap{position:relative;display:inline-block;margin-bottom:8px}
.perfil-av{width:76px;height:76px;border-radius:50%;object-fit:cover;border:3px solid var(--branco);background:var(--cinza2);display:block;box-shadow:var(--sombra)}
.perfil-badge{position:absolute;bottom:2px;right:2px;width:22px;height:22px}
.perfil-nome{font-size:18px;font-weight:800;color:var(--texto);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.perfil-bio{font-size:13px;color:var(--texto2);margin-bottom:4px}
.perfil-criado{font-size:11px;color:var(--texto3);margin-bottom:14px}
.p-stats{display:flex;gap:24px;margin-bottom:14px}
.p-stat{display:flex;flex-direction:column;align-items:center}
.p-stat-n{font-size:17px;font-weight:800;color:var(--texto)}
.p-stat-l{font-size:10px;color:var(--texto2);font-weight:500}
.p-btns{display:flex;gap:10px;margin-bottom:16px}
.p-btn{padding:9px 20px;border-radius:20px;border:2px solid var(--cinza2);background:transparent;color:var(--texto2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif}
.p-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
.p-thumb{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;background:var(--cinza2)}
.nb#btnEmoji .ic{font-size:22px}
</style>
</head>
<body>

<!-- CAPTCHA -->
<div id="telaCaptcha">
  <div class="captcha-box">
    <div class="captcha-logo">🎬 MagnonPacVideos</div>
    <div class="captcha-sub">Digite o código abaixo para continuar</div>
    <div class="captcha-calc" id="calcDisplay">------</div>
    <input class="captcha-inp" type="text" id="captchaInp" placeholder="Digite o código acima" maxlength="6" autocomplete="off" style="text-transform:uppercase">
    <button class="captcha-btn" onclick="verificarCaptcha()">Continuar →</button>
    <div class="captcha-err" id="captchaErr"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="telaLogin" class="hidden">
  <div class="login-box">
    <div class="login-logo">🎬 MagnonPacVideos</div>
    <div class="login-sub">Entre na sua conta</div>
    <input class="l-inp" type="text" id="inputUser" placeholder="@ usuário">
    <input class="l-inp" type="password" id="inputSenha" placeholder="Senha 4 dígitos" maxlength="4">
    <button class="l-btn" onclick="entrar()">Entrar</button>
    <button class="l-btn2" onclick="mostrarCadastro()">Criar conta</button>
    <div class="l-err" id="erroLogin"></div>
  </div>
</div>

<!-- HEADER -->
<div id="header" class="hidden">
  <div class="h-logo">MagnonPacVideos<span>Sua plataforma de vídeos</span></div>
  <div class="h-right">
    <button class="h-busca-btn" onclick="abrirBusca()">🔍</button>
    <img class="h-av" id="headerFoto" src="" onclick="irTela('telaPerfil')">
  </div>
</div>

<!-- NAVBAR -->
<div id="navbar" class="hidden">
  <button class="nb ativo" id="btnLongos" onclick="irTela('telaLongos')"><span class="ic">🎬</span>VÍDEOS</button>
  <button class="nb" id="btnShorts" onclick="irTela('telaShorts')"><span class="ic">⚡</span>SHORTS</button>
  <button class="nb" id="btnUpload" onclick="irTela('telaUpload')"><span class="ic">➕</span>POSTAR</button>
  <button class="nb" id="btnEmoji" onclick="abrirEmoji()"><span class="ic">🔖</span>STICKERS</button>
  <button class="nb" id="btnPerfil" onclick="irTela('telaPerfil')"><span class="ic">👤</span>PERFIL</button>
</div>

<!-- MODAL BUSCA -->
<div id="modalBusca" class="hidden">
  <div class="busca-box">
    <div class="busca-header">
      <input class="busca-inp" type="text" id="buscaInp" placeholder="🔍 Buscar vídeos..." oninput="buscarVideos(this.value)">
      <button class="busca-close" onclick="fecharBusca()">✕</button>
    </div>
    <div class="busca-resultados" id="buscaResultados">
      <div class="busca-vazio">Digite para buscar vídeos 🎬</div>
    </div>
  </div>
</div>

<!-- MODAL EMOJI/STICKER -->
<div id="modalEmoji" class="hidden">
  <div class="emoji-box">
    <div class="emoji-header">
      <div class="emoji-titulo">
        🔖 Buscar Stickers & Emojis
        <button class="emoji-close" onclick="fecharEmoji()">✕</button>
      </div>
      <input class="emoji-inp" type="text" id="emojiInp" placeholder="Descreva o emoji ou sticker..." oninput="buscarEmojis(this.value)">
    </div>
    <div class="emoji-grid" id="emojiGrid">
      <div style="grid-column:1/-1;text-align:center;color:var(--texto2);padding:30px;font-size:14px">Digite para buscar stickers 🔖</div>
    </div>
  </div>
</div>

<!-- VIDEOS LONGOS -->
<div class="tela ativa" id="telaLongos">
  <div class="yt-list" id="listaLongos"></div>
</div>

<!-- SHORTS -->
<div class="tela" id="telaShorts">
  <div class="shorts-list" id="listaShorts"></div>
</div>

<!-- UPLOAD -->
<div class="tela" id="telaUpload">
  <div class="up-wrap">
    <div class="up-card">
      <h3>🎬 Publicar Vídeo</h3>
      <label class="up-drop" onclick="document.getElementById('uv').click()">🎥 Selecionar Vídeo</label>
      <input type="file" id="uv" accept="video/*" style="display:none" onchange="document.getElementById('nv').textContent='✅ '+this.files[0].name">
      <div class="up-nome" id="nv"></div>
      <label class="up-drop" onclick="document.getElementById('uc').click()">🖼️ Capa/Banner (opcional)</label>
      <input type="file" id="uc" accept="image/*" style="display:none" onchange="document.getElementById('nc').textContent='✅ Capa: '+this.files[0].name">
      <div class="up-nome" id="nc"></div>
      <input class="up-inp" type="text" id="tituloVideo" placeholder="Título do vídeo">
      <textarea class="up-inp" id="descVideo" placeholder="Descrição..." rows="3"></textarea>
      <div class="up-tipo">
        <input type="radio" name="tipo" id="tipoLongo" value="longo" checked>
        <label for="tipoLongo">🎬 Vídeo Longo</label>
        <input type="radio" name="tipo" id="tipoShort" value="short">
        <label for="tipoShort">⚡ Short</label>
      </div>
      <button class="up-btn" onclick="publicarVideo()">
        <img src="/1772470950850.png">Publicar
      </button>
    </div>
  </div>
</div>

<!-- PERFIL -->
<div class="tela" id="telaPerfil">
  <div class="perfil-capa"></div>
  <div class="perfil-body">
    <div class="perfil-av-wrap">
      <img class="perfil-av" id="pAv" src="">
      <img class="perfil-badge hidden" id="pBadge" src="/1772471641994.png">
    </div>
    <div class="perfil-nome" id="pNome"></div>
    <div class="perfil-bio" id="pBio"></div>
    <div class="perfil-criado" id="pCriado"></div>
    <div class="p-stats">
      <div class="p-stat"><span class="p-stat-n" id="pVideos">0</span><span class="p-stat-l">Vídeos</span></div>
      <div class="p-stat"><span class="p-stat-n" id="pSegs">0</span><span class="p-stat-l">Seguidores</span></div>
      <div class="p-stat"><span class="p-stat-n" id="pSeg">0</span><span class="p-stat-l">Seguindo</span></div>
    </div>
    <div class="p-btns">
      <label class="p-btn" onclick="document.getElementById('inputFotoPerfil').click()">📷 Trocar Foto</label>
      <input type="file" id="inputFotoPerfil" accept="image/*" style="display:none" onchange="trocarFoto(this)">
    </div>
    <div class="p-grid" id="pGrid"></div>
  </div>
</div>

<script>
const VCHECK='/1772471641994.png';
const LIKE='/1772471053704.png';
const FOLLOW='/pngtree-follow-button-png-image_7099105.png';
let userLogado=null;
let captchaResp=null;
let todosVideos=[];

function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n||0}
function ago(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'agora';if(s<3600)return Math.floor(s/60)+'min';if(s<86400)return Math.floor(s/3600)+'h';if(s<2592000)return Math.floor(s/86400)+'d';return Math.floor(s/2592000)+'m'}
function dataFull(d){if(!d)return'';return new Date(d).toLocaleDateString('pt-BR')}
function av(foto,username){return foto||`https://ui-avatars.com/api/?name=${encodeURIComponent(username||'U')}&background=1db954&color=fff&size=64`}

function salvarSessao(user){localStorage.setItem('mpv_user',JSON.stringify(user))}
function carregarSessao(){try{const u=localStorage.getItem('mpv_user');return u?JSON.parse(u):null;}catch(e){return null;}}
function limparSessao(){localStorage.removeItem('mpv_user')}

// CAPTCHA - CÓDIGO ALEATÓRIO (sem depender do backend)
function gerarCodigo(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='';
  for(let i=0;i<6;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function carregarCaptcha(){
  captchaResp=gerarCodigo();
  document.getElementById('calcDisplay').textContent=captchaResp;
  document.getElementById('captchaInp').value='';
  document.getElementById('captchaErr').textContent='';
}

function verificarCaptcha(){
  const val=document.getElementById('captchaInp').value.trim().toUpperCase();
  if(val===captchaResp){
    document.getElementById('telaCaptcha').classList.add('hidden');
    const sessao=carregarSessao();
    if(sessao){userLogado=sessao;iniciar();return;}
    document.getElementById('telaLogin').classList.remove('hidden');
  }else{
    document.getElementById('captchaErr').textContent='Código incorreto! Tente novamente.';
    carregarCaptcha();
  }
}

async function entrar(){
  const u=document.getElementById('inputUser').value.trim();
  const s=document.getElementById('inputSenha').value.trim();
  if(!u||!s)return;
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,senha:s})});
  const d=await r.json();
  if(d.erro){document.getElementById('erroLogin').textContent=d.erro;return;}
  userLogado=d.usuario;salvarSessao(userLogado);iniciar();
}

function mostrarCadastro(){
  const u=prompt('Escolha seu @username:');if(!u)return;
  const s=prompt('Senha de 4 dígitos:');if(!s||s.length!==4){alert('Senha deve ter 4 dígitos!');return;}
  cadastrar(u,s);
}

async function cadastrar(u,s){
  const r=await fetch('/api/cadastro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,senha:s})});
  const d=await r.json();
  if(d.erro){alert(d.erro);return;}
  userLogado=d.usuario;salvarSessao(userLogado);iniciar();
}

function iniciar(){
  document.getElementById('telaLogin').classList.add('hidden');
  document.getElementById('header').classList.remove('hidden');
  document.getElementById('navbar').classList.remove('hidden');
  atualizarAv();irTela('telaLongos');
}

function irTela(id){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('ativo'));
  const m={telaLongos:'btnLongos',telaShorts:'btnShorts',telaUpload:'btnUpload',telaPerfil:'btnPerfil'};
  if(m[id])document.getElementById(m[id]).classList.add('ativo');
  if(id==='telaLongos')carregarLongos();
  if(id==='telaShorts')carregarShorts();
  if(id==='telaPerfil')carregarPerfil();
}

function atualizarAv(){document.getElementById('headerFoto').src=av(userLogado.foto,userLogado.username)}

function abrirBusca(){document.getElementById('modalBusca').classList.remove('hidden');document.getElementById('buscaInp').focus()}
function fecharBusca(){document.getElementById('modalBusca').classList.add('hidden')}

let buscaTimer;
function buscarVideos(q){
  clearTimeout(buscaTimer);
  const el=document.getElementById('buscaResultados');
  if(!q){el.innerHTML='<div class="busca-vazio">Digite para buscar vídeos 🎬</div>';return;}
  buscaTimer=setTimeout(()=>{
    const res=todosVideos.filter(v=>(v.titulo||'').toLowerCase().includes(q.toLowerCase())||(v.descricao||'').toLowerCase().includes(q.toLowerCase())||(v.username||'').toLowerCase().includes(q.toLowerCase()));
    if(!res.length){el.innerHTML='<div class="busca-vazio">Nenhum vídeo encontrado 😔</div>';return;}
    el.innerHTML=res.map(v=>`<div class="busca-item" onclick="fecharBusca();irTela('${v.tipo==='short'?'telaShorts':'telaLongos'}')"><img class="busca-thumb" src="${v.capa||v.arquivo}" onerror="this.style.background='var(--cinza2)'"><div class="busca-info"><div class="busca-titulo">${v.titulo||'Sem título'}</div><div class="busca-meta">@${v.username} • ${ago(v.data)} • ${fmt(v.views||0)} views</div></div></div>`).join('');
  },300);
}

function abrirEmoji(){document.getElementById('modalEmoji').classList.remove('hidden');document.getElementById('emojiInp').focus()}
function fecharEmoji(){document.getElementById('modalEmoji').classList.add('hidden')}

let emojiTimer;
function buscarEmojis(q){
  clearTimeout(emojiTimer);
  const el=document.getElementById('emojiGrid');
  if(!q){el.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--texto2);padding:30px;font-size:14px">Digite para buscar stickers 🔖</div>';return;}
  el.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--texto2);padding:30px;font-size:14px">Buscando...</div>';
  emojiTimer=setTimeout(async()=>{
    try{
      const r=await fetch(`https://emoji.gg/api/?search=${encodeURIComponent(q)}`);
      const d=await r.json();
      if(!d.length){el.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--texto2);padding:30px;font-size:14px">Nenhum resultado 😔</div>';return;}
      el.innerHTML=d.slice(0,20).map(e=>`<div class="emoji-item"><img src="${e.image}" loading="lazy"><a class="emoji-dl" href="${e.image}" download="${e.title}.png" target="_blank">⬇️ Baixar</a></div>`).join('');
    }catch{el.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--texto2);padding:30px;font-size:14px">Erro ao buscar 😔</div>';}
  },400);
}

async function carregarLongos(){
  const r=await fetch('/api/videos');
  todosVideos=await r.json();
  const lista=todosVideos.filter(v=>v.tipo!=='short');
  const el=document.getElementById('listaLongos');
  if(!lista.length){el.innerHTML='<div class="vazio"><div class="vazio-ico">🎬</div><div class="vazio-titulo">Nenhum vídeo ainda</div><div class="vazio-sub">Seja o primeiro a publicar!</div></div>';return;}
  el.innerHTML=lista.map(v=>renderVideo(v)).join('');
}

async function carregarShorts(){
  const r=await fetch('/api/videos');
  todosVideos=await r.json();
  const lista=todosVideos.filter(v=>v.tipo==='short');
  const el=document.getElementById('listaShorts');
  if(!lista.length){el.innerHTML='<div class="vazio"><div class="vazio-ico">⚡</div><div class="vazio-titulo">Nenhum short ainda</div><div class="vazio-sub">Seja o primeiro a publicar!</div></div>';return;}
  el.innerHTML=lista.map(v=>renderShort(v)).join('');
}

function renderVideo(v){
  const liked=(v.likes||[]).includes(userLogado.username);
  const naoEu=v.username!==userLogado.username;
  const jaSigo=(userLogado.seguindo||[]).includes(v.username);
  const vcheck=v.verificado?`<img src="${VCHECK}" class="yt-vcheck">`:'';
  const coms=(v.comentarios||[]).map(c=>renderCom(c)).join('');
  return`<div class="yt-card">
    <div class="yt-thumb-wrap" id="wrap-${v.id}" onclick="playVideo('ytp-${v.id}',this)">
      ${v.capa?`<img class="yt-thumb" src="${v.capa}">`:`<div class="yt-no-thumb">🎬</div>`}
      <div class="yt-play"><svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="yt-views">👁 ${fmt(v.views||0)}</div>
    </div>
    <video class="yt-player" id="ytp-${v.id}" src="${v.arquivo}" controls></video>
    <div class="yt-info">
      <div class="yt-titulo">${v.titulo||'Sem título'}</div>
      <div class="yt-meta">
        <img class="yt-av" src="${av(v.foto,v.username)}">
        <div class="yt-info2">
          <div class="yt-uname">@${v.username}${vcheck}${naoEu?`<button class="bseg ${jaSigo?'sim':''}" style="margin-left:4px" onclick="seguir('${v.username}',this)"><img src="${FOLLOW}"></button>`:''}</div>
          <div class="yt-data">${ago(v.data)}</div>
        </div>
      </div>
    </div>
    <div class="yt-actions">
      <button class="btn-act${liked?' liked':''}" onclick="darLike('${v.id}',this)"><img src="${LIKE}"><span class="lc">${fmt((v.likes||[]).length)}</span></button>
      <button class="btn-act" onclick="togComs('${v.id}')">💬 ${(v.comentarios||[]).length}</button>
    </div>
    <div class="coms-box" id="cb-${v.id}">
      <div class="coms-lista" id="cl-${v.id}">${coms}</div>
      <div class="com-row"><input class="com-inp" id="ci-${v.id}" placeholder="Comentar..."><button class="com-send" onclick="envCom('${v.id}')">→</button></div>
    </div>
  </div>`;
}

function renderShort(v){
  const liked=(v.likes||[]).includes(userLogado.username);
  const naoEu=v.username!==userLogado.username;
  const jaSigo=(userLogado.seguindo||[]).includes(v.username);
  const vcheck=v.verificado?`<img src="${VCHECK}" style="width:14px">`:'';
  const coms=(v.comentarios||[]).map(c=>renderCom(c)).join('');
  return`<div class="short-card">
    <video class="short-video" src="${v.arquivo}" controls playsinline></video>
    <div class="short-info">
      <div class="short-uname"><img style="width:26px;height:26px;border-radius:50%;object-fit:cover" src="${av('',v.username)}">@${v.username}${vcheck}${naoEu?`<button class="bseg ${jaSigo?'sim':''}" style="margin-left:auto" onclick="seguir('${v.username}',this)"><img src="${FOLLOW}"></button>`:''}</div>
      ${v.descricao?`<div class="short-desc">${v.descricao}</div>`:''}
    </div>
    <div class="short-actions">
      <button class="btn-act${liked?' liked':''}" onclick="darLike('${v.id}',this)"><img src="${LIKE}"><span class="lc">${fmt((v.likes||[]).length)}</span></button>
      <button class="btn-act" onclick="togComs('s${v.id}')">💬 ${(v.comentarios||[]).length}</button>
    </div>
    <div class="coms-box" id="cb-s${v.id}">
      <div class="coms-lista" id="cl-s${v.id}">${coms}</div>
      <div class="com-row"><input class="com-inp" id="ci-s${v.id}" placeholder="Comentar..."><button class="com-send" onclick="envCom('${v.id}')">→</button></div>
    </div>
  </div>`;
}

function renderCom(c){
  return`<div class="com-item"><img class="com-av" src="${av(c.foto,c.username)}"><div class="com-bubble"><div class="com-user">@${c.username}${c.verificado?`<img src="${VCHECK}" style="width:12px">`:''}</div><div class="com-txt">${c.texto}</div></div></div>`;
}

function playVideo(id,wrap){
  const player=document.getElementById(id);
  wrap.style.display='none';player.style.display='block';player.play();
  fetch('/api/view',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId:id.replace('ytp-','')})});
}

function togComs(id){
  const el=document.getElementById('cb-'+id);
  el.style.display=el.style.display==='block'?'none':'block';
}

async function darLike(id,btn){
  const r=await fetch('/api/like',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId:id,username:userLogado.username})});
  const d=await r.json();
  btn.classList.toggle('liked',d.liked);
  btn.querySelector('.lc').textContent=fmt(d.likes);
}

async function seguir(alvo,btn){
  const r=await fetch('/api/seguir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:userLogado.username,alvo})});
  const d=await r.json();
  if(d.sucesso){
    if(d.seguindo){btn.className='bseg sim';if(!userLogado.seguindo)userLogado.seguindo=[];userLogado.seguindo.push(alvo);salvarSessao(userLogado);}
    else{btn.className='bseg';userLogado.seguindo=userLogado.seguindo.filter(x=>x!==alvo);salvarSessao(userLogado);}
  }
}

async function envCom(id){
  const inp=document.getElementById('ci-'+id);
  if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  const realId=id.startsWith('s')?id.slice(1):id;
  const r=await fetch('/api/comentario',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId:realId,username:userLogado.username,texto:txt})});
  const d=await r.json();
  if(d.sucesso){
    const lista=document.getElementById('cl-'+id);
    lista.innerHTML+=renderCom(d.comentario);
    lista.scrollTop=lista.scrollHeight;inp.value='';
  }
}

async function publicarVideo(){
  const file=document.getElementById('uv').files[0];
  const capa=document.getElementById('uc').files[0];
  const titulo=document.getElementById('tituloVideo').value;
  const desc=document.getElementById('descVideo').value;
  const tipo=document.querySelector('input[name="tipo"]:checked').value;
  if(!file){alert('Selecione um vídeo!');return;}
  if(!titulo){alert('Adicione um título!');return;}
  alert('Enviando... aguarde!');
  const fd=new FormData();
  fd.append('arquivo',file);fd.append('username',userLogado.username);
  fd.append('titulo',titulo);fd.append('descricao',desc||'');fd.append('tipo',tipo);
  if(capa)fd.append('capa',capa);
  try{
    const r=await fetch('/api/video',{method:'POST',body:fd});
    const d=await r.json();
    if(d.sucesso){alert('✅ Vídeo publicado!');irTela(tipo==='short'?'telaShorts':'telaLongos');}
    else alert('Erro: '+JSON.stringify(d));
  }catch(e){alert('Erro: '+e.message);}
}

async function carregarPerfil(){
  const videos=await(await fetch('/api/videos')).json();
  const meus=videos.filter(v=>v.username===userLogado.username);
  document.getElementById('pAv').src=av(userLogado.foto,userLogado.username);
  if(userLogado.verificado)document.getElementById('pBadge').classList.remove('hidden');
  document.getElementById('pNome').textContent='@'+userLogado.username;
  document.getElementById('pBio').textContent=userLogado.bio||'';
  document.getElementById('pCriado').textContent='📅 Membro desde '+dataFull(userLogado.criado);
  document.getElementById('pVideos').textContent=meus.length;
  const segs=userLogado.seguidores;
  document.getElementById('pSegs').textContent=fmt(typeof segs==='number'?segs:(segs||[]).length);
  document.getElementById('pSeg').textContent=(userLogado.seguindo||[]).length;
  document.getElementById('pGrid').innerHTML=meus.map(v=>`<img class="p-thumb" src="${v.capa||v.arquivo}" onerror="this.style.background='var(--cinza2)'">`).join('');
}

async function trocarFoto(input){
  const file=input.files[0];if(!file)return;
  const fd=new FormData();
  fd.append('perfil',file);fd.append('username',userLogado.username);
  const r=await fetch('/api/perfil/foto',{method:'POST',body:fd});
  const d=await r.json();
  userLogado.foto=d.foto;salvarSessao(userLogado);atualizarAv();carregarPerfil();
}

window.addEventListener('DOMContentLoaded', function(){ carregarCaptcha(); });
</script>
